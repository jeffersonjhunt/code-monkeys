# NIM for LLMs — model-free / BYO container, NIM LLM 2.0.3.
# Variables come from .env (gitignored; see .env.example).
#
# Track A experiment (round 2): use the model-free NIM (which supports any HF
# model via NIM_MODEL_PATH=hf://...) to serve the original
# RedHatAI/Qwen3-Coder-Next-NVFP4. Earlier attempt with `llm-nim:latest` (which
# is still 1.15.5 and has no GB10 profiles) failed; `model-free-nim:2.0.3` is
# the correct image for the BYO/model-free path on DGX Spark.
#
# Host port 8001 to avoid colliding with vLLM on :8000 during the experiment.

services:
  nim:
    image: nvcr.io/nim/nvidia/model-free-nim:2.0.3
    container_name: nim
    restart: unless-stopped
    shm_size: '16gb'
    environment:
      NGC_API_KEY: ${NGC_API_KEY}
      HF_TOKEN: ${HF_TOKEN}
      NIM_MODEL_PATH: ${NIM_MODEL_PATH:-hf://RedHatAI/Qwen3-Coder-Next-NVFP4}
      NIM_SERVED_MODEL_NAME: ${NIM_SERVED_MODEL_NAME:-qwen3-coder-next}
    ports:
      - "8001:8000"
    volumes:
      - /srv/models/nim-cache:/opt/nim/.cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/v1/health/ready', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 1800s   # JIT engine build can take 20–30 min on first start
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"
